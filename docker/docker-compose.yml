version: "3.9"

services:
  # ───────────────────────────────────────────────────────────────────────────
  # LLM Proxy
  # ───────────────────────────────────────────────────────────────────────────
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-proxy:local
    container_name: llm-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      READ_TIMEOUT_SEC: "5"
      WRITE_TIMEOUT_SEC: "60"
      IDLE_TIMEOUT_SEC: "120"
      UPSTREAM_TIMEOUT_SEC: "30"
      MAX_RETRIES: "3"
      REDIS_URL: "redis://redis:6379/0"
      RATE_LIMIT_WINDOW_SEC: "60"
      RATE_LIMIT_MAX_REQUESTS: "100"
      # Comma-separated list of valid API keys — replace in production via secrets
      API_KEYS: "test-key-1,test-key-2"
      # Backend configuration — define at least one backend
      BACKEND_0_NAME: "openai-primary"
      BACKEND_0_URL: "https://api.openai.com"
      BACKEND_0_MODELS: "gpt-4o,gpt-4-turbo"
      BACKEND_0_WEIGHT: "10"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - proxy-net

  # ───────────────────────────────────────────────────────────────────────────
  # Redis — sorted-set rate limiting store
  # ───────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: llm-proxy-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - proxy-net

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus — metrics scraping
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: llm-proxy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - proxy-net

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana — dashboards
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: llm-proxy-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - proxy-net

volumes:
  grafana-data:

networks:
  proxy-net:
    driver: bridge
